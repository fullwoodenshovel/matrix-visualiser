<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Matrix Visualiser</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0d0d0d;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            height: 100vh;
            overflow: hidden;
        }

        /*
            The canvas must ALWAYS be present at full size so macroquad
            initialises WebGL with a real viewport. We never use display:none
            on it. In console mode the UI overlay simply sits on top of it.
        */
        #glcanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* ── Console overlay ── */
        #console-ui {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #e0e0e0;
            background: #0d0d0d;
            z-index: 10;
        }

        /* Hidden in show mode */
        #console-ui.hidden { display: none; }

        #console-log {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .log-input { color: #7ecfff; }
        .log-input::before { content: '> '; }
        .log-output { color: #b0f0b0; white-space: pre-wrap; }
        .log-error  { color: #ff7070; white-space: pre-wrap; }
        .log-info   { color: #666;    white-space: pre-wrap; font-style: italic; }

        #input-row {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            border-top: 1px solid #2a2a2a;
            background: #111;
            gap: 6px;
        }

        #input-row::before {
            content: '>';
            color: #7ecfff;
            flex-shrink: 0;
        }

        #cmd-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #e0e0e0;
            font-family: inherit;
            font-size: inherit;
            caret-color: #7ecfff;
        }

        #cmd-input::placeholder { color: #333; }

        #hint {
            padding: 3px 16px;
            font-size: 11px;
            color: #333;
            background: #111;
        }
    </style>
</head>
<body>

<!--
    Canvas is always in the DOM at full size.
    The console UI overlays it; removing the overlay reveals the canvas.
-->
<canvas id="glcanvas" tabindex="1"></canvas>

<div id="console-ui">
    <div id="console-log">
        <div class="log-info">Matrix Visualiser</div>
        <div class="log-info">Try: Show Mat(1,2,-3,3) * Mat(0.5,-1,1,0.5)</div>
        <div class="log-info">For more information, check <a href="https://github.com/fullwoodenshovel/matrix-visualiser">the github</a></div>
        <div class="log-info"></div>
    </div>
    <div id="input-row">
        <input id="cmd-input" type="text" placeholder="expression..." autofocus autocomplete="off" spellcheck="false">
    </div>
    <div id="hint">↑ ↓ history</div>
</div>

<script>
    // Suppress known-harmless noise from mq_js_bundle.js
    const _warn = console.warn.bind(console);
    const _log  = console.log.bind(console);
    const SUPPRESS = [
        'No gl',
        'Plugin macroquad_audio',
        'Plugin sapp_jsutils',
        'Plugin quad_net',
    ];
    const shouldSuppress = msg => SUPPRESS.some(s => String(msg).includes(s));
    console.warn = (...args) => { if (!shouldSuppress(args[0])) _warn(...args); };
    console.log  = (...args) => { if (!shouldSuppress(args[0])) _log(...args); };
</script>
<script src="https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js"></script>
<script>
    const logEl   = document.getElementById('console-log');
    const inputEl = document.getElementById('cmd-input');
    const glcanvas  = document.getElementById('glcanvas');
    const ui      = document.getElementById('console-ui');

    let cmdHistory = [];
    let historyIdx = -1;
    let inShowMode = false;

    function logLine(text, cls) {
        const div = document.createElement('div');
        div.className = cls;
        div.textContent = text;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
    }

    function submitToWasm(cmd) {
        if (!window.wasm_exports) return;
        const bytes = new TextEncoder().encode(cmd);
        const ptr   = wasm_exports.web_input_buf_ptr();
        new Uint8Array(wasm_memory.buffer, ptr, bytes.length).set(bytes);
        wasm_exports.web_submit_input(bytes.length);
    }

    function pollWasm() {
        if (!window.wasm_exports) return;

        // Read any pending output from Rust
        const len = wasm_exports.web_get_output_len();
        if (len > 0) {
            const ptr  = wasm_exports.web_get_output_ptr();
            const text = new TextDecoder().decode(
                new Uint8Array(wasm_memory.buffer, ptr, len)
            );
            wasm_exports.web_clear_output();
            for (const line of text.split('\n')) {
                if (!line.trim()) continue;
                const cls = line.startsWith('Error:') ? 'log-error' : 'log-output';
                logLine(line, cls);
            }
        }

        // Check for show mode changes
        const nowShowing = wasm_exports.web_is_show_mode() === 1;

        if (nowShowing && !inShowMode) {
            inShowMode = true;
            // Hide the console overlay — the canvas is already there underneath
            ui.classList.add('hidden');
            glcanvas.focus();
        } else if (!nowShowing && inShowMode) {
            inShowMode = false;
            // Bring the console overlay back
            ui.classList.remove('hidden');
            logLine('← returned to console', 'log-info');
            inputEl.focus();
        }
    }

    setInterval(pollWasm, 16);

    inputEl.addEventListener("paste", (e) => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData("text");
        const start = inputEl.selectionStart;
        const end   = inputEl.selectionEnd;
        inputEl.value =
            inputEl.value.slice(0, start) +
            text +
            inputEl.value.slice(end);
        inputEl.selectionStart = inputEl.selectionEnd = start + text.length;
    });

    inputEl.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            const cmd = inputEl.value.trim();
            if (!cmd) return;
            logLine(cmd, 'log-input');
            cmdHistory.unshift(cmd);
            historyIdx = -1;
            inputEl.value = '';
            submitToWasm(cmd);

        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (historyIdx < cmdHistory.length - 1) historyIdx++;
            inputEl.value = cmdHistory[historyIdx] ?? '';

        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIdx > 0) {
                historyIdx--;
                inputEl.value = cmdHistory[historyIdx] ?? '';
            } else {
                historyIdx = -1;
                inputEl.value = '';
            }
        }
    });

    load("matrix-visualiser.wasm");
</script>
</body>
</html>
